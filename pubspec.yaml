name: rogue_card_game
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flame: ^1.19.0
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Persistenza locale
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Utility
  uuid: ^4.2.1
  intl: ^0.18.1
  
  # Audio
  audioplayers: ^5.2.1
  
  # UI Components
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  generate: true

  # Assets per il gioco
  assets:
    - assets/images/
    - assets/images/cards/
    - assets/images/enemies/
    - assets/images/backgrounds/
    - assets/images/icons/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/fonts/
    - assets/data/
  
  # Fonts personalizzati
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
